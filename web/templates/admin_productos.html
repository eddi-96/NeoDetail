<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>NeoDetail | Admin Productos</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <header class="topbar">
    <div class="brand">NeoDetail Admin</div>
    <nav class="nav">
      <a href="/tienda">Ver tienda</a>
      <a href="/admin/productos" class="active">Productos</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="title">Crear producto</h1>

    <div class="panel">
      <div class="formgrid">
        <input id="nombre" class="input" placeholder="Nombre"/>
        <input id="precio" class="input" placeholder="Precio" type="number" step="0.01"/>
        <input id="stock" class="input" placeholder="Stock" type="number"/>
        <input id="imagen_url" class="input" placeholder="Imagen URL (opcional)"/>
        <textarea id="descripcion" class="input" placeholder="Descripción"></textarea>
      </div>

      <button class="btn" id="crearBtn">Crear</button>
      <p id="msg" class="hint"></p>
    </div>

    <h2 class="subtitle">Productos actuales</h2>
    <div id="lista" class="grid"></div>
  </main>

  <script src="/static/js/admin_productos.js"></script>
</body>
</html>
