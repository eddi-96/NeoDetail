<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>NeoDetail | Admin Productos</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <header class="topbar">
    <div class="brand">NeoDetail Admin</div>
    <nav class="nav">
      <a href="/tienda">Ver tienda</a>
      <a href="/admin/productos" class="active">Productos</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="title">Crear producto</h1>

    <div class="panel">
  <form action="/admin/productos/crear" method="POST">
    <div class="formgrid">
      <input name="nombre" class="input" placeholder="Nombre" required/>
      <input name="precio" class="input" placeholder="Precio" type="number" step="0.01" required/>
      <input name="stock" class="input" placeholder="Stock" type="number" required/>
      <input name="imagen_url" class="input" placeholder="Imagen URL (opcional)"/>
      <textarea name="descripcion" class="input" placeholder="Descripción"></textarea>
    </div>

    <button class="btn" type="submit">Crear</button>
  </form>
</div>

    <h2 class="subtitle">Productos actuales</h2>
    <div id="lista" class="grid"></div>
  </main>


</body>
</html>
